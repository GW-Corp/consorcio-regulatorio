<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KonQ — Regulatório de Consórcios</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #0a0a0f;
  --bg2: #12121a;
  --bg3: #1a1a28;
  --bg4: #222236;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --accent3: #00cec9;
  --green: #00b894;
  --red: #e17055;
  --orange: #fdcb6e;
  --text: #e8e8f0;
  --text2: #9999b0;
  --text3: #666680;
  --border: #2a2a3e;
  --card: #15151f;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  overflow-x: hidden;
}

.app {
  display: flex;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 300px;
  min-width: 300px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 24px 0;
  position: fixed;
  top: 0;
  left: 0;
  height: 100vh;
  overflow-y: auto;
  z-index: 100;
  transition: transform 0.3s ease;
}

.sidebar-header {
  padding: 0 24px 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}

.sidebar-header .logo {
  font-family: 'Space Mono', monospace;
  font-size: 28px;
  font-weight: 700;
  color: var(--accent2);
  letter-spacing: 4px;
}

.sidebar-header .logo span { color: var(--accent3); }
.sidebar-header .sub { font-size: 11px; color: var(--text3); margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

.progress-bar-wrap {
  margin: 16px 24px 0;
  background: var(--bg4);
  border-radius: 8px;
  height: 6px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent3));
  border-radius: 8px;
  transition: width 0.5s ease;
}

.progress-label { font-size: 11px; color: var(--text3); margin-top: 6px; padding: 0 24px; }

.nav-section { padding: 8px 0; }
.nav-section-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 12px 24px 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  cursor: pointer;
  transition: all 0.2s;
  border-left: 3px solid transparent;
  font-size: 13.5px;
  color: var(--text2);
}

.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--bg3); color: var(--accent2); border-left-color: var(--accent); font-weight: 600; }
.nav-item .status { margin-left: auto; font-size: 10px; }
.nav-item .status.done { color: var(--green); }
.nav-item .status.pending { color: var(--text3); }

.nav-item .icon { font-size: 16px; min-width: 20px; text-align: center; }

/* MAIN */
.main {
  margin-left: 300px;
  flex: 1;
  padding: 40px 60px 80px;
  max-width: 960px;
}

.section-badge {
  display: inline-block;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent3);
  background: rgba(0,206,201,0.1);
  padding: 4px 12px;
  border-radius: 4px;
  margin-bottom: 12px;
}

.section-title {
  font-size: 32px;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 8px;
}

.section-subtitle {
  font-size: 15px;
  color: var(--text2);
  margin-bottom: 32px;
}

.doc-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--accent2);
  text-decoration: none;
  background: rgba(108,92,231,0.1);
  padding: 8px 16px;
  border-radius: 8px;
  margin-bottom: 32px;
  transition: all 0.2s;
  border: 1px solid rgba(108,92,231,0.2);
}
.doc-link:hover { background: rgba(108,92,231,0.2); transform: translateY(-1px); }

/* TOPIC CARD */
.topic-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  margin-bottom: 16px;
  overflow: hidden;
  transition: all 0.3s ease;
}

.topic-card:hover { border-color: var(--bg4); }

.topic-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 24px;
  cursor: pointer;
  user-select: none;
}

.topic-number {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent3);
  background: rgba(0,206,201,0.1);
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.topic-title { font-size: 16px; font-weight: 600; flex: 1; }
.topic-ref { font-size: 11px; color: var(--text3); font-family: 'Space Mono', monospace; }

.topic-toggle {
  font-size: 20px;
  color: var(--text3);
  transition: transform 0.3s;
  flex-shrink: 0;
}

.topic-toggle.open { transform: rotate(180deg); }

.topic-body {
  display: none;
  padding: 0 24px 24px;
  border-top: 1px solid var(--border);
}

.topic-body.open { display: block; padding-top: 20px; }

.topic-body p {
  font-size: 14.5px;
  color: var(--text);
  margin-bottom: 16px;
  line-height: 1.8;
}

.topic-body .highlight {
  font-weight: 600;
  color: var(--accent2);
}

/* EXAMPLE BOX */
.example-box {
  background: var(--bg3);
  border-left: 3px solid var(--accent3);
  border-radius: 0 12px 12px 0;
  padding: 16px 20px;
  margin: 16px 0;
}

.example-box .example-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  color: var(--accent3);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.example-box p {
  font-size: 13.5px !important;
  color: var(--text2) !important;
  margin-bottom: 8px !important;
}

/* WARN BOX */
.warn-box {
  background: rgba(253,203,110,0.08);
  border-left: 3px solid var(--orange);
  border-radius: 0 12px 12px 0;
  padding: 16px 20px;
  margin: 16px 0;
}

.warn-box .warn-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  color: var(--orange);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.warn-box p {
  font-size: 13.5px !important;
  color: var(--text2) !important;
}

/* CHECK */
.check-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,184,148,0.1);
  color: var(--green);
  border: 1px solid rgba(0,184,148,0.2);
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
  margin-top: 8px;
}

.check-btn:hover { background: rgba(0,184,148,0.2); }
.check-btn.checked { background: var(--green); color: #fff; }

/* QUIZ */
.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  flex-wrap: wrap;
  gap: 16px;
}

.quiz-score {
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  color: var(--accent2);
  background: rgba(108,92,231,0.1);
  padding: 8px 16px;
  border-radius: 8px;
}

.quiz-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 16px;
}

.quiz-card .q-number {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--accent3);
  margin-bottom: 8px;
}

.quiz-card .q-text {
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 20px;
  line-height: 1.6;
}

.quiz-option {
  display: block;
  width: 100%;
  text-align: left;
  padding: 14px 18px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  font-size: 14px;
  color: var(--text);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
  line-height: 1.5;
}

.quiz-option:hover:not(.answered) { border-color: var(--accent); background: var(--bg4); }
.quiz-option.correct { border-color: var(--green); background: rgba(0,184,148,0.12); color: var(--green); }
.quiz-option.wrong { border-color: var(--red); background: rgba(225,112,85,0.12); color: var(--red); }
.quiz-option.show-correct { border-color: var(--green); background: rgba(0,184,148,0.08); }
.quiz-option.answered { cursor: default; }

.quiz-explanation {
  margin-top: 12px;
  padding: 14px 18px;
  background: var(--bg3);
  border-radius: 10px;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.7;
  border-left: 3px solid var(--accent);
}

.quiz-nav {
  display: flex;
  gap: 8px;
  margin-top: 24px;
  flex-wrap: wrap;
}

.quiz-nav button {
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-family: 'Space Mono', monospace;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text2);
  transition: all 0.2s;
}

.quiz-nav button:hover { background: var(--bg4); color: var(--text); }
.quiz-nav button.current { background: var(--accent); color: #fff; border-color: var(--accent); }
.quiz-nav button.q-correct { border-color: var(--green); color: var(--green); }
.quiz-nav button.q-wrong { border-color: var(--red); color: var(--red); }

.btn-primary {
  background: linear-gradient(135deg, var(--accent), #8b7cf7);
  color: #fff;
  border: none;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(108,92,231,0.3); }

.btn-outline {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
}
.btn-outline:hover { border-color: var(--text3); color: var(--text); }

/* MOBILE */
.mobile-toggle {
  display: none;
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 200;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  width: 44px;
  height: 44px;
  border-radius: 12px;
  font-size: 20px;
  cursor: pointer;
  align-items: center;
  justify-content: center;
}

@media (max-width: 800px) {
  .mobile-toggle { display: flex; }
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; padding: 60px 20px 80px; }
}

/* ANIMATIONS */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.animate-in { animation: fadeInUp 0.4s ease forwards; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* SUMMARY TABLE */
.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 32px;
}

@media (max-width: 700px) { .summary-grid { grid-template-columns: 1fr; } }

.summary-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.3s;
}
.summary-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.summary-card .sc-icon { font-size: 24px; margin-bottom: 8px; }
.summary-card .sc-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.summary-card .sc-desc { font-size: 12px; color: var(--text3); }
</style>
</head>
<body>

<button class="mobile-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

<div class="app">
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">Kon<span>Q</span></div>
    <div class="sub">Regulatório de Consórcios</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">0 de 28 tópicos estudados</div>
  </div>

  <div class="nav-section">
    <div class="nav-section-title">Panorama</div>
    <div class="nav-item active" onclick="showSection('home')"><span class="icon">🏠</span> Visão Geral</div>
  </div>

  <div class="nav-section">
    <div class="nav-section-title">Legislação</div>
    <div class="nav-item" onclick="showSection('lei11795')"><span class="icon">📜</span> Lei 11.795/2008</div>
    <div class="nav-item" onclick="showSection('circ3432')"><span class="icon">📋</span> Circular 3.432/2009</div>
    <div class="nav-item" onclick="showSection('circ3433')"><span class="icon">🏛️</span> Circular 3.433/2009</div>
    <div class="nav-item" onclick="showSection('res4515')"><span class="icon">🔒</span> Resolução 4.515/2016</div>
    <div class="nav-item" onclick="showSection('lei9613')"><span class="icon">🛡️</span> Lei 9.613/1998 (PLD)</div>
    <div class="nav-item" onclick="showSection('cdc')"><span class="icon">👤</span> CDC (Lei 8.078/1990)</div>
  </div>

  <div class="nav-section">
    <div class="nav-section-title">Avaliação</div>
    <div class="nav-item" onclick="showSection('quiz')"><span class="icon">🎯</span> Quiz — 50 Questões</div>
  </div>
</nav>

<main class="main" id="mainContent">
</main>
</div>

<script>
// ===================== DATA =====================

const SECTIONS = {

// ---- HOME ----
home: {
  badge: "PANORAMA",
  title: "Framework Regulatório de Consórcios",
  subtitle: "Guia interativo completo com toda a legislação, circulares e normas que regem o sistema de consórcios no Brasil.",
  content: `
<div class="summary-grid">
  <div class="summary-card" onclick="showSection('lei11795')">
    <div class="sc-icon">📜</div>
    <div class="sc-name">Lei nº 11.795/2008</div>
    <div class="sc-desc">Lei do Sistema de Consórcios — base legal de todo o setor</div>
  </div>
  <div class="summary-card" onclick="showSection('circ3432')">
    <div class="sc-icon">📋</div>
    <div class="sc-name">Circular BCB nº 3.432/2009</div>
    <div class="sc-desc">Regulamentação operacional dos grupos de consórcio</div>
  </div>
  <div class="summary-card" onclick="showSection('circ3433')">
    <div class="sc-icon">🏛️</div>
    <div class="sc-name">Circular BCB nº 3.433/2009</div>
    <div class="sc-desc">Autorização para funcionar como administradora</div>
  </div>
  <div class="summary-card" onclick="showSection('res4515')">
    <div class="sc-icon">🔒</div>
    <div class="sc-name">Resolução CMN nº 4.515/2016</div>
    <div class="sc-desc">Governança, controles internos e compliance</div>
  </div>
  <div class="summary-card" onclick="showSection('lei9613')">
    <div class="sc-icon">🛡️</div>
    <div class="sc-name">Lei nº 9.613/1998</div>
    <div class="sc-desc">Prevenção à lavagem de dinheiro (PLD/FT)</div>
  </div>
  <div class="summary-card" onclick="showSection('cdc')">
    <div class="sc-icon">👤</div>
    <div class="sc-name">Lei nº 8.078/1990</div>
    <div class="sc-desc">Código de Defesa do Consumidor</div>
  </div>
</div>

<div class="warn-box">
  <div class="warn-label">⚠️ IMPORTANTE</div>
  <p>O Banco Central atualiza circulares com frequência. Sempre verifique a versão consolidada no <a href="https://www.bcb.gov.br/estabilidadefinanceira/buscanormas" target="_blank" style="color:var(--orange)">buscador de normas do BCB</a> antes de tomar decisão baseada em artigo específico.</p>
</div>

<h3 style="font-size:18px;margin:32px 0 16px;">Ordem recomendada de estudo</h3>
<p style="font-size:14px;color:var(--text2);">1. Lei 11.795 (base conceitual) → 2. Circular 3.433 (autorização BACEN) → 3. Circular 3.432 (operação dos grupos) → 4. Resolução 4.515 (governança) → 5. Lei 9.613 (PLD) → 6. CDC (relação com consorciado)</p>
`
},

// ---- LEI 11.795 ----
lei11795: {
  badge: "LEI FEDERAL",
  title: "Lei nº 11.795/2008",
  subtitle: "Lei do Sistema de Consórcios — dispõe sobre o Sistema de Consórcios no Brasil.",
  link: "https://www.planalto.gov.br/ccivil_03/_ato2007-2010/2008/lei/l11795.htm",
  linkLabel: "Texto integral no Planalto",
  topics: [
    {
      id: "def-consorcio",
      num: "01",
      title: "Definição Legal de Consórcio",
      ref: "Arts. 2º e 3º",
      body: `<p>O consórcio é a <span class="highlight">reunião de pessoas naturais ou jurídicas em grupo</span>, com prazo de duração e número de cotas previamente determinados, promovida por administradora de consórcios, com a finalidade de propiciar a seus integrantes, de forma isonômica, a aquisição de bens ou serviços, por meio de autofinanciamento.</p>
<p>O conceito de <span class="highlight">autofinanciamento</span> é central: os consorciados financiam uns aos outros. Não há empréstimo bancário. O dinheiro vem exclusivamente das contribuições mensais dos participantes do grupo.</p>
<div class="example-box">
  <div class="example-label">💡 Exemplo Prático</div>
  <p>Imagine um grupo de 100 pessoas, cada uma querendo comprar um carro de R$ 50.000. Em vez de cada um poupar sozinho, elas se reúnem. Todo mês, cada uma contribui R$ 625. O total arrecadado mensalmente é R$ 62.500 — suficiente para contemplar ao menos um participante por mês com a carta de crédito de R$ 50.000 (os R$ 12.500 restantes cobrem taxa de administração, fundo de reserva e seguro).</p>
</div>
<div class="warn-box">
  <div class="warn-label">⚠️ Ponto de atenção</div>
  <p>O consórcio NÃO é investimento e NÃO é financiamento. É autofinanciamento coletivo. A administradora que vender consórcio como "investimento" comete infração grave perante o BACEN.</p>
</div>`
    },
    {
      id: "grupo",
      num: "02",
      title: "O Grupo de Consórcio",
      ref: "Arts. 3º a 5º",
      body: `<p>Cada grupo tem <span class="highlight">autonomia patrimonial</span> em relação à administradora e a outros grupos. Isso significa que os recursos de um grupo não podem ser usados para cobrir déficits de outro grupo, nem para pagar despesas da administradora.</p>
<p>O grupo é constituído por um <span class="highlight">número determinado de cotas</span>, cada uma representando um participante. O prazo de duração e o valor da carta de crédito são definidos na criação do grupo.</p>
<div class="example-box">
  <div class="example-label">💡 Exemplo Prático</div>
  <p>A administradora KonQ lança o Grupo 001 — Imóveis: 200 cotas, carta de crédito de R$ 300.000, prazo de 180 meses (15 anos). Se a KonQ também tiver um Grupo 002 — Veículos: 150 cotas, carta de R$ 80.000, 72 meses — os recursos de cada grupo são 100% segregados. Se o Grupo 002 tiver inadimplência alta, isso não afeta o Grupo 001.</p>
</div>
<p>O grupo tem, portanto, <span class="highlight">personalidade financeira própria</span>: receitas (parcelas), despesas (contemplações, taxas) e resultado (sobra ou perda) são apurados individualmente.</p>`
    },
    {
      id: "administradora",
      num: "03",
      title: "A Administradora de Consórcios",
      ref: "Arts. 5º a 9º",
      body: `<p>A administradora é a <span class="highlight">pessoa jurídica prestadora de serviços</span> responsável pela gestão dos grupos de consórcio. Deve ser autorizada pelo Banco Central do Brasil para funcionar.</p>
<p>Suas principais responsabilidades incluem: constituir e administrar os grupos, realizar as assembleias, processar contemplações, cobrar contribuições, investir os recursos do grupo conforme normas do BACEN, e prestar contas aos consorciados.</p>
<p>A administradora age como <span class="highlight">mandatária dos interesses do grupo</span>. Tem dever fiduciário — deve agir sempre no melhor interesse dos consorciados, não no seu próprio.</p>
<div class="example-box">
  <div class="example-label">💡 Exemplo Prático</div>
  <p>A KonQ Consórcios, como administradora, recebe as parcelas de todos os consorciados do Grupo 001. Esses recursos ficam depositados em conta vinculada do grupo, separada do caixa da KonQ. A KonQ aplica esses recursos em renda fixa (conforme regulação) e, mensalmente, realiza assembleia para contemplação. A receita da KonQ vem exclusivamente da taxa de administração.</p>
</div>
<div class="warn-box">
  <div class="warn-label">⚠️ Ponto de atenção</div>

      body: `<p>A carta de crédito é o <span class="highlight">valor que o consorciado contemplado tem direito de utilizar</span> para aquisição do bem ou serviço previsto no contrato. Não é dinheiro livre — é crédito vinculado à finalidade do grupo.</p>
<p>O crédito pode ser utilizado para: compra do bem referenciado, aquisição de bem de valor inferior (com devolução da diferença ao grupo ou abatimento nas parcelas), ou quitação de financiamento de bem da mesma natureza.</p>
<div class="example-box">
  <div class="example-label">💡 Exemplo Prático</div>
  <p>Maria foi contemplada no grupo de imóveis com carta de R$ 300.000. Ela encontra um apartamento de R$ 280.000. A diferença de R$ 20.000 pode ser usada para reduzir o saldo das parcelas restantes. Se ela quiser um imóvel de R$ 350.000, precisa complementar com recursos próprios. A carta NÃO pode ser usada para comprar um carro ou viajar — o crédito é vinculado à finalidade do grupo.</p>

      body: `<p>Contemplação é o <span class="highlight">ato pelo qual o consorciado é habilitado a utilizar o crédito</span>. Ocorre de duas formas: sorteio (aleatório) e lance (competitivo).</p>
<p><strong>Sorteio:</strong> Todos os consorciados ativos e adimplentes concorrem igualmente. Geralmente usa os números da Loteria Federal para transparência.</p>
<p><strong>Lance:</strong> O consorciado oferece antecipar parcelas futuras. Quem oferece o maior lance (percentual sobre o valor do crédito) é contemplado. Existem modalidades: lance livre (valor que o consorciado quiser), lance fixo (percentual predeterminado), e lance embutido (usando parte do próprio crédito).</p>
<div class="example-box">
  <div class="example-label">💡 Exemplo Prático</div>
  <p>No Grupo 001 da KonQ, a assembleia mensal tem 200 participantes. Primeiro, ocorre o sorteio baseado na Loteria Federal — contempla 1 pessoa. Depois, abre-se o lance: João oferece 30% (R$ 90.000 sobre carta de R$ 300.000) e Pedro oferece 25%. João é contemplado por lance, e seus R$ 90.000 antecipam parcelas futuras, reduzindo as próximas mensalidades dele.</p>
</div>
<div class="warn-box">

  <p>A contemplação NÃO garante a entrega imediata do crédito. O contemplado precisa apresentar garantias (como alienação fiduciária do bem), estar adimplente e passar por análise de crédito da administradora antes de receber o recurso.</p>

<p>Não existe limite legal máximo para a taxa, mas o BACEN e a concorrência de mercado regulam na prática. Taxas comuns variam de 10% a 20% do valor do crédito, diluídas ao longo de todo o prazo.</p>
<div class="example-box">
  <div class="example-label">💡 Exemplo Prático</div>
  <p>Grupo de imóvel, carta de R$ 300.000, prazo de 180 meses, taxa de administração de 15%. O total da taxa é R$ 45.000 (15% de R$ 300.000), diluído em 180 parcelas = R$ 250/mês de taxa. Essa é a receita que a KonQ obtém de cada cota desse grupo. Com 200 cotas, a receita mensal do grupo para a KonQ seria R$ 50.000.</p>

<p>O <span class="highlight">fundo de reserva</span> é uma reserva adicional para cobrir inadimplência, despesas extraordinárias e insuficiências financeiras do grupo. Seu percentual é definido em contrato.</p>
<div class="example-box">
  <div class="example-label">💡 Exemplo Prático</div>
  <p>No Grupo 001, a parcela mensal de R$ 2.500 se divide assim: R$ 1.667 para o fundo comum (destinado a contemplações), R$ 250 para taxa de administração, R$ 83 para o fundo de reserva (5% da carta, diluído), e R$ 500 para seguro. Se 10 consorciados ficarem inadimplentes, o fundo de reserva cobre temporariamente a defasagem para que as contemplações não parem.</p>

      body: `<p><strong>Direitos:</strong> participar das assembleias, concorrer à contemplação se adimplente, receber o crédito quando contemplado, acompanhar a situação financeira do grupo, e receber restituição de valores ao final do grupo (se não contemplado).</p>
<p><strong>Deveres:</strong> pagar as contribuições mensais pontualmente, apresentar garantias quando contemplado, utilizar o crédito na finalidade prevista, e comunicar alterações cadastrais.</p>
<div class="example-box">
  <div class="example-label">💡 Exemplo Prático</div>
  <p>Carlos aderiu a um grupo de veículos mas parou de pagar no 8º mês. A administradora notifica Carlos e, após o prazo contratual de inadimplência, ele é excluído do grupo. Seus valores pagos ficam retidos e serão devolvidos somente ao final do grupo, após prestação de contas final, com deduções de multa contratual e taxa de administração proporcional.</p>

      body: `<p>O consorciado pode ser excluído por <span class="highlight">inadimplência</span> ou pode solicitar <span class="highlight">desistência voluntária</span>. Em ambos os casos, o valor pago ao fundo comum será restituído, mas somente conforme as regras do contrato e da lei.</p>
<p>A restituição pode ocorrer: por sorteio na assembleia (o excluído/desistente concorre mensalmente), ou no encerramento do grupo — o que vier primeiro.</p>
<div class="example-box">
  <div class="example-label">💡 Exemplo Prático</div>
  <p>Ana desistiu do consórcio no mês 24 de 72. Ela já pagou R$ 30.000 ao fundo comum. A administradora pode deduzir: multa contratual (geralmente 10-20% do valor pago), taxa de administração proporcional, e seguro. O saldo restante será devolvido a Ana quando ela for sorteada na assembleia como excluída ou no encerramento do grupo — o que pode levar anos.</p>

</div>`

    {
      id: "encerramento",
      num: "10",
      title: "Encerramento do Grupo",
      ref: "Arts. 31 a 33",
      body: `<p>O grupo encerra quando todos os consorciados foram contemplados e cumpriram suas obrigações, ou quando expirou o prazo de duração. A administradora tem <span class="highlight">60 dias após o encerramento</span> para fazer a prestação de contas final.</p>
<p>Na prestação de contas, apura-se: saldo do fundo comum, fundo de reserva, rendimentos das aplicações financeiras. Se houver sobra, é dividida entre os consorciados proporcionalmente. Se houver perda, é rateada da mesma forma.</p>
<div class="example-box">
  <div class="example-label">💡 Exemplo Prático</div>
  <p>O Grupo 001 da KonQ encerra após 180 meses. Na prestação de contas: o fundo de reserva tem saldo positivo de R$ 120.000 (arrecadou mais do que usou para cobrir inadimplência). Os rendimentos das aplicações foram R$ 80.000. Total a distribuir: R$ 200.000 entre 200 cotistas = R$ 1.000 para cada um. Esse valor é a "sobra" do grupo.</p>
</div>`

      id: "fiscalizacao",
      num: "11",
      title: "Fiscalização pelo Banco Central",
      ref: "Arts. 6º a 8º",
      body: `<p>O Banco Central do Brasil (BACEN) é o <span class="highlight">órgão responsável pela normatização, coordenação, supervisão, fiscalização e controle</span> das atividades do sistema de consórcios.</p>
<p>O BACEN pode: autorizar/cancelar o funcionamento de administradoras, aplicar penalidades, decretar intervenção ou liquidação extrajudicial, exigir informações e documentos, e realizar inspeções presenciais.</p>
<div class="example-box">
  <div class="example-label">💡 Exemplo Prático</div>
  <p>Em 2019, o BACEN cancelou a autorização da administradora Ademilar após constatar irregularidades na gestão dos grupos. Os consorciados tiveram seus direitos preservados — os grupos continuaram sob intervenção do BACEN até regularização. Isso mostra o poder regulatório e a importância de operar em conformidade desde o dia 1.</p>
</div>`

  ]
},

circ3432: {

<p>A linguagem deve ser clara e acessível. O contrato é padronizado — todos os consorciados de um mesmo grupo assinam o mesmo contrato.</p>

</div>`

      body: `<p>As assembleias são <span class="highlight">reuniões mensais obrigatórias</span> onde ocorrem as contemplações (sorteio e lance), a prestação de contas periódica e deliberações relevantes para o grupo.</p>
<p>A administradora convoca e conduz as assembleias. Os consorciados podem participar presencialmente ou por meio digital (se previsto em contrato). O quórum mínimo para deliberações extraordinárias é definido em regulamento.</p>

<p><span class="highlight">Lance fixo:</span> Percentual predeterminado (ex: 25% do crédito). Se mais de um consorciado oferecer o lance fixo, desempate por sorteio.</p>
<p><span class="highlight">Lance embutido:</span> O consorciado usa parte do próprio crédito como lance. Ex: oferece R$ 60.000 de lance em uma carta de R$ 300.000. Se contemplado, recebe R$ 240.000 (carta menos lance).</p>

      body: `<p>Os recursos não utilizados do grupo (fundo comum e fundo de reserva não contemplados) devem ser aplicados pela administradora em <span class="highlight">investimentos de baixo risco</span>: títulos públicos federais, CDBs de instituições financeiras com classificação mínima de risco, ou fundos de investimento em renda fixa.</p>

<p>A administradora tem prazo definido em contrato para liberar o crédito após a contemplação e apresentação de todas as garantias.</p>
<div class="example-box">

<p>Se o contemplado ficar inadimplente e já tiver recebido o bem, a administradora pode executar as garantias (retomada do bem alienado fiduciariamente).</p>

</div>`

      body: `<p>Para operar como administradora de consórcios, a empresa deve obter <span class="highlight">autorização prévia do Banco Central</span>. Requisitos fundamentais: ser constituída como sociedade anônima (S.A.) ou limitada (LTDA), ter capital social mínimo conforme porte, e apresentar estudo de viabilidade econômico-financeira.</p>
<p>O processo é burocrático e rigoroso — pode levar de 6 meses a mais de 1 ano. O BACEN analisa cada aspecto da empresa antes de conceder autorização.</p>
<div class="example-box">

<p>O capital deve estar efetivamente integralizado (depositado) — não basta ser subscrito. Além disso, a administradora deve manter patrimônio líquido compatível com seu volume de operações ao longo do tempo.</p>

<p>Os diretores responsáveis perante o BACEN devem ter formação e experiência compatíveis com a função. O BACEN pode entrevistar e exigir comprovação de experiência.</p>

      ref: "Art. 11",
      body: `<p>A administradora deve comunicar ao <span class="highlight">COAF (Conselho de Controle de Atividades Financeiras)</span> operações que apresentem indícios de lavagem de dinheiro: transações incompatíveis com a renda do cliente, pagamentos em espécie de valores elevados, movimentações atípicas, ou qualquer situação suspeita.</p>

<div class="example-box">

  {q:"Qual é o prazo de arrependimento do consumidor para vendas fora do estabelecimento (CDC)?",o:["3 dias","5 dias úteis","7 dias corridos","15 dias"],c:2,e:"O art. 49 do CDC garante 7 dias corridos para o consumidor desistir de contratos firmados fora do estabelecimento comercial."},

  {q:"A administradora pode afirmar em publicidade que o consórcio é um 'investimento sem risco'?",o:["Sim — é informação verdadeira","Sim, se comparar com a poupança","Não — consórcio não é investimento e isso é publicidade enganosa","Não, mas pode dizer que é 'investimento de baixo risco'"],c:2,e:"Consórcio NÃO é investimento. Afirmar isso constitui publicidade enganosa, vedada pelo CDC e passível de sanções pelo BACEN."},
  {q:"A administradora pode prometer 'contemplação nos primeiros 3 meses' em anúncios?",o:["Sim, se tiver histórico estatístico","Não — contemplação depende de sorteio ou lance, não pode ser prometida","Sim, se colocar um asterisco com nota de rodapé","Sim, para lances de até 50%"],c:1,e:"Prometer contemplação é publicidade enganosa. A contemplação depende de sorteio (aleatório) ou lance (competitivo), não podendo ser garantida."},
  {q:"Segundo a Circular 3.432, quando o grupo inicia suas atividades?",o:["Quando a primeira cota é vendida","Quando atinge o número mínimo de adesões que garanta viabilidade","Quando o BACEN autoriza o grupo especificamente","No primeiro dia do mês seguinte ao lançamento"],c:1,e:"O grupo inicia (primeira assembleia) quando atinge o número mínimo de adesões que garanta sua viabilidade econômico-financeira."},
  {q:"O contrato de adesão é personalizado para cada consorciado?",o:["Sim — cada um tem cláusulas diferentes","Não — é padronizado para todos do mesmo grupo","Sim, dependendo da análise de crédito","Depende da política da administradora"],c:1,e:"O contrato de adesão é padronizado — todos os consorciados de um mesmo grupo assinam o mesmo contrato, garantindo isonomia."},
  {q:"Qual critério é usado para desempate no lance fixo?",o:["Quem ofereceu primeiro","Sorteio entre os empatados","Quem tem mais parcelas pagas","Antiguidade no grupo"],c:1,e:"No lance fixo, quando mais de um consorciado oferece o mesmo valor, o desempate é feito por sorteio."},
  {q:"O contemplado precisa comprovar capacidade de pagamento das parcelas restantes?",o:["Não — já é membro do grupo","Sim — passa por análise de crédito","Apenas se o crédito for acima de R$ 500.000","Apenas para grupos de imóveis"],c:1,e:"O contemplado deve comprovar capacidade de pagamento das parcelas restantes, apresentar garantias e estar adimplente para receber o crédito."},
  {q:"O que acontece com o veículo de um contemplado que fica inadimplente?",o:["Nada — o veículo é dele","A administradora pode executar a alienação fiduciária (busca e apreensão)","O veículo é transferido para outro consorciado","A administradora negocia diretamente com o consorciado sem medida judicial"],c:1,e:"O veículo (ou imóvel) fica alienado fiduciariamente ao grupo. Em caso de inadimplência, a administradora pode acionar busca e apreensão para recuperar o bem."},
  {q:"Qual é a finalidade do seguro prestamista no consórcio?",o:["Proteger a administradora contra fraudes","Quitar as parcelas em caso de morte ou invalidez do consorciado","Garantir a valorização do bem","Cobrir danos ao bem adquirido"],c:1,e:"O seguro prestamista quita as parcelas restantes em caso de morte ou invalidez permanente do consorciado, protegendo tanto o grupo quanto os herdeiros."},
  {q:"Se o consorciado falece antes de ser contemplado, o que acontece com o seguro prestamista?",o:["O seguro é cancelado e os herdeiros perdem tudo","O crédito é liberado aos herdeiros conforme as regras do contrato","Os valores são devolvidos com desconto","O seguro só cobre quem já foi contemplado"],c:1,e:"Se o consorciado falece antes da contemplação, o seguro quita as parcelas e o crédito pode ser liberado aos herdeiros, conforme as regras do contrato e da apólice."},
  {q:"A governança da administradora exige segregação de funções. O que isso significa?",o:["Todos os diretores devem trabalhar em escritórios separados","Uma mesma pessoa não pode concentrar funções conflitantes","A administradora deve ter pelo menos 10 funcionários","Cada grupo deve ter um gerente exclusivo"],c:1,e:"Segregação de funções significa que, por exemplo, quem opera os grupos não pode ser quem faz a auditoria interna, evitando conflitos de interesse."},
  {q:"A ouvidoria da administradora é canal de primeira instância para reclamações?",o:["Sim — toda reclamação vai para a ouvidoria","Não — é canal de última instância, depois que o SAC não resolveu","Sim — e é o único canal obrigatório","Depende do porte da administradora"],c:1,e:"A ouvidoria é canal de última instância. O consorciado deve primeiro tentar resolver pelo SAC. Só quando o SAC não resolver, aciona a ouvidoria."},
  {q:"A administradora precisa ter plano de continuidade de negócios?",o:["Não — é opcional","Sim — faz parte da política de controles internos","Apenas se operar digitalmente","Apenas se tiver mais de 1.000 consorciados"],c:1,e:"O plano de continuidade de negócios é parte da política de controles internos exigida pela Resolução 4.515."},
  {q:"O que é risco de liquidez no contexto de uma administradora de consórcios?",o:["Risco de a administradora perder a autorização","Risco de não conseguir honrar as contemplações por falta de recursos no grupo","Risco de os consorciados processarem a administradora","Risco de perda dos investimentos em ações"],c:1,e:"Risco de liquidez é a possibilidade de o grupo não ter recursos suficientes para honrar as contemplações previstas, geralmente por inadimplência elevada."},
  {q:"A taxa de administração tem limite máximo definido em lei?",o:["Sim — 15% é o máximo legal","Sim — 20% é o máximo","Não — não há limite legal, mas o mercado regula","Sim — o BACEN define anualmente"],c:2,e:"Não existe limite legal máximo para a taxa de administração. Na prática, a concorrência de mercado e a transparência regulatória regulam os valores."},
  {q:"O que é o fundo comum do grupo de consórcio?",o:["Reserva para emergências","Contribuições dos consorciados destinadas à contemplação","Taxa da administradora","Fundo de investimento do grupo"],c:1,e:"O fundo comum é formado pelas contribuições mensais dos consorciados e é a fonte de onde saem os créditos para as contemplações."},
  {q:"O consorciado inadimplente pode participar do sorteio?",o:["Sim — inadimplência não afeta o sorteio","Não — apenas consorciados adimplentes concorrem","Sim, mas com 50% de chance","Depende do regulamento do grupo"],c:1,e:"O consorciado inadimplente NÃO concorre às contemplações enquanto estiver em atraso com suas obrigações."},
  {q:"Se a carta de crédito é de R$ 300.000 e o bem custa R$ 280.000, o que acontece com a diferença?",o:["O consorciado recebe os R$ 20.000 em dinheiro","A diferença abate parcelas restantes ou volta ao grupo","A administradora fica com a diferença","A diferença é perdida"],c:1,e:"Se o bem tem valor inferior à carta, a diferença pode ser usada para reduzir o saldo das parcelas restantes do consorciado."},
  {q:"A administradora pode usar recursos dos grupos para pagar suas próprias despesas operacionais?",o:["Sim, até 5% do fundo","Sim, em caso de emergência","Não — os recursos são segregados e pertencem ao grupo","Sim, se devolver com juros"],c:2,e:"Os recursos dos grupos são segregados. A administradora NÃO pode usá-los para cobrir despesas próprias — isso é infração grave passível de intervenção."},
  {q:"Qual normativo trata especificamente dos requisitos para obter autorização do BACEN para funcionar como administradora?",o:["Lei 11.795/2008","Circular 3.432/2009","Circular 3.433/2009","Resolução 4.515/2016"],c:2,e:"A Circular 3.433/2009 é a norma que trata especificamente da autorização para funcionar como administradora de consórcios."},
  {q:"O consorciado pode utilizar a carta de crédito para quitar um financiamento de bem da mesma natureza?",o:["Não — só pode comprar bem novo","Sim — é uma das utilizações previstas em lei","Apenas se o financiamento for do mesmo banco","Apenas com autorização especial do BACEN"],c:1,e:"A Lei 11.795 permite que a carta de crédito seja utilizada para quitação de financiamento de bem da mesma natureza do grupo."},
  {q:"As assembleias utilizam qual referência para o sorteio, garantindo transparência?",o:["Números gerados por sistema da administradora","Números da Loteria Federal","Dados do IBGE","Números escolhidos pelos consorciados"],c:1,e:"Geralmente, os grupos utilizam os números da Loteria Federal como referência para o sorteio, garantindo transparência e impossibilidade de manipulação."},
  {q:"O cancelamento da autorização da administradora pelo BACEN pode ser voluntário?",o:["Não — sempre é imposto pelo BACEN","Sim — pode ser solicitado pela administradora","Apenas se não houver grupos ativos","Apenas se aprovado pela CVM"],c:1,e:"O cancelamento pode ser voluntário (a administradora solicita) ou compulsório (imposto pelo BACEN). Em ambos os casos, os grupos devem ser regularizados."},
  {q:"Qual é a principal diferença entre consórcio e financiamento bancário?",o:["No consórcio não há taxa de administração","No financiamento não há contemplação","No consórcio há autofinanciamento coletivo sem juros bancários","No consórcio o bem é entregue imediatamente"],c:2,e:"A principal diferença é que no consórcio há autofinanciamento coletivo — os participantes financiam uns aos outros — sem juros bancários. No financiamento, o banco empresta e cobra juros."}
];

// ===================== STATE =====================
let currentSection = 'home';
let checkedTopics = JSON.parse(localStorage.getItem('konq_checked') || '{}');
let quizAnswers = JSON.parse(localStorage.getItem('konq_quiz') || '{}');
let currentQuizPage = 0;
const QUIZ_PER_PAGE = 5;

// ===================== RENDER =====================

function showSection(id) {
  currentSection = id;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => {
    if(n.getAttribute('onclick') && n.getAttribute('onclick').includes(id)) n.classList.add('active');
  });
  document.querySelector('.sidebar').classList.remove('open');

  if (id === 'quiz') { renderQuiz(); return; }

  const s = SECTIONS[id];
  if (!s) return;

  let html = `<div class="animate-in">`;
  html += `<div class="section-badge">${s.badge}</div>`;
  html += `<h1 class="section-title">${s.title}</h1>`;
  html += `<p class="section-subtitle">${s.subtitle}</p>`;

  if (s.link) {
    html += `<a href="${s.link}" target="_blank" class="doc-link">📄 ${s.linkLabel} ↗</a>`;
  }

  if (s.content) html += s.content;

  if (s.topics) {
    s.topics.forEach(t => {
      const isChecked = checkedTopics[t.id];
      html += `
        <div class="topic-card" id="card-${t.id}">
          <div class="topic-header" onclick="toggleTopic('${t.id}')">
            <div class="topic-number">${t.num}</div>
            <div>
              <div class="topic-title">${t.title}</div>
              <div class="topic-ref">${t.ref}</div>
            </div>
            <div class="topic-toggle" id="toggle-${t.id}">▼</div>
          </div>
          <div class="topic-body" id="body-${t.id}">
            ${t.body}
            <button class="check-btn ${isChecked?'checked':''}" onclick="markStudied('${t.id}', this)">
              ${isChecked ? '✓ Estudado' : '☐ Marcar como estudado'}
            </button>
          </div>
        </div>
      `;
    });
  }

  html += `</div>`;
  document.getElementById('mainContent').innerHTML = html;
  document.getElementById('mainContent').scrollTop = 0;
  window.scrollTo(0,0);
  updateProgress();
}

function toggleTopic(id) {
  const body = document.getElementById('body-' + id);
  const toggle = document.getElementById('toggle-' + id);
  body.classList.toggle('open');
  toggle.classList.toggle('open');
}

function markStudied(id, btn) {
  checkedTopics[id] = !checkedTopics[id];
  localStorage.setItem('konq_checked', JSON.stringify(checkedTopics));
  btn.classList.toggle('checked');
  btn.innerHTML = checkedTopics[id] ? '✓ Estudado' : '☐ Marcar como estudado';
  updateProgress();
}

function updateProgress() {
  let total = 0;
  let done = 0;
  Object.values(SECTIONS).forEach(s => {
    if (s.topics) {
      s.topics.forEach(t => {
        total++;
        if (checkedTopics[t.id]) done++;
      });
    }
  });
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  const bar = document.getElementById('progressBar');
  const label = document.getElementById('progressLabel');
  if (bar) bar.style.width = pct + '%';
  if (label) label.textContent = `${done} de ${total} tópicos estudados (${pct}%)`;
}

// ===================== QUIZ =====================

function renderQuiz() {
  const start = currentQuizPage * QUIZ_PER_PAGE;
  const end = Math.min(start + QUIZ_PER_PAGE, QUIZ.length);
  const totalPages = Math.ceil(QUIZ.length / QUIZ_PER_PAGE);

  let correct = 0, answered = 0;
  Object.entries(quizAnswers).forEach(([k,v]) => {
    answered++;
    if (v.correct) correct++;
  });

  let html = `<div class="animate-in">`;
  html += `<div class="section-badge">AVALIAÇÃO</div>`;
  html += `<h1 class="section-title">Quiz — 50 Questões</h1>`;
  html += `<div class="quiz-header">
    <p class="section-subtitle" style="margin-bottom:0">Teste seu conhecimento sobre a regulamentação de consórcios.</p>
    <div class="quiz-score">${correct}/${answered} corretas ${answered > 0 ? '(' + Math.round(correct/answered*100) + '%)' : ''}</div>
  </div>`;

  if (answered === QUIZ.length) {
    const pct = Math.round(correct/QUIZ.length*100);
    let msg = pct >= 80 ? '🎉 Excelente! Você domina o regulatório.' : pct >= 60 ? '👍 Bom resultado, mas revise os tópicos errados.' : '📚 Recomendo revisitar os conteúdos antes de prosseguir.';
    html += `<div style="background:var(--bg3);border-radius:12px;padding:20px;margin-bottom:24px;text-align:center;">
      <div style="font-size:48px;margin-bottom:8px;">${pct >= 80 ? '🏆' : pct >= 60 ? '📊' : '📖'}</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:8px;">${correct} de ${QUIZ.length} — ${pct}%</div>
      <div style="color:var(--text2);font-size:14px;">${msg}</div>
      <button class="btn-primary" style="margin-top:16px;" onclick="resetQuiz()">Refazer Quiz</button>
    </div>`;
  }

  for (let i = start; i < end; i++) {
    const q = QUIZ[i];
    const a = quizAnswers[i];
    html += `<div class="quiz-card" id="qcard-${i}">
      <div class="q-number">QUESTÃO ${i+1} DE ${QUIZ.length}</div>
      <div class="q-text">${q.q}</div>`;

    q.o.forEach((opt, oi) => {
      let cls = '';
      if (a !== undefined) {
        cls = 'answered';
        if (oi === q.c) cls += ' correct show-correct';
        else if (oi === a.selected && !a.correct) cls += ' wrong';
      }
      html += `<button class="quiz-option ${cls}" ${a !== undefined ? 'disabled' : ''} onclick="answerQuiz(${i},${oi})">${String.fromCharCode(65+oi)}) ${opt}</button>`;
    });

    if (a !== undefined) {
      html += `<div class="quiz-explanation"><strong>${a.correct ? '✓ Correto!' : '✗ Incorreto.'}</strong> ${q.e}</div>`;
    }

    html += `</div>`;
  }

  html += `<div class="quiz-nav">`;
  for (let p = 0; p < totalPages; p++) {
    let pgClass = p === currentQuizPage ? 'current' : '';
    // check if any in this page are answered
    let allCorrect = true, anyWrong = false, anyAnswered = false;
    for (let j = p*QUIZ_PER_PAGE; j < Math.min((p+1)*QUIZ_PER_PAGE, QUIZ.length); j++) {
      if (quizAnswers[j] !== undefined) {
        anyAnswered = true;
        if (!quizAnswers[j].correct) { allCorrect = false; anyWrong = true; }
      } else { allCorrect = false; }
    }
    if (anyAnswered && allCorrect) pgClass += ' q-correct';
    else if (anyWrong) pgClass += ' q-wrong';
    html += `<button class="${pgClass}" onclick="quizPage(${p})">${p*QUIZ_PER_PAGE+1}-${Math.min((p+1)*QUIZ_PER_PAGE, QUIZ.length)}</button>`;
  }
  html += `</div>`;
  html += `</div>`;

  document.getElementById('mainContent').innerHTML = html;
  window.scrollTo(0,0);
}

function answerQuiz(qi, oi) {
  const q = QUIZ[qi];
  quizAnswers[qi] = { selected: oi, correct: oi === q.c };
  localStorage.setItem('konq_quiz', JSON.stringify(quizAnswers));
  renderQuiz();
  // scroll to question
  setTimeout(() => {
    const el = document.getElementById('qcard-' + qi);
    if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
  }, 100);
}

function quizPage(p) {
  currentQuizPage = p;
  renderQuiz();
}

function resetQuiz() {
  quizAnswers = {};
  localStorage.removeItem('konq_quiz');
  currentQuizPage = 0;
  renderQuiz();
}

// ===================== INIT =====================
showSection('home');
</script>
</body>
</html>
