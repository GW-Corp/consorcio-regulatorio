      body: `<p>A administradora deve ter <span class="highlight">estrutura de governança compatível com seu porte e complexidade</span>: conselho de administração (se S.A. de maior porte), diretoria executiva, segregação de funções, e definição clara de competências e responsabilidades.</p>
<p>O princípio é evitar que uma mesma pessoa concentre funções conflitantes — por exemplo, quem opera os grupos não pode ser quem faz a auditoria interna.</p>
<div class="example-box"><div class="example-label">💡 Exemplo Prático</div><p>Na KonQ, a estrutura mínima seria: um diretor responsável pela operação dos grupos (Marcos), outro pela compliance e controles internos (Gilson Jr), e outro pela área financeira (Walter Neto). O diretor de compliance não pode ser subordinado ao de operações, garantindo independência para reportar irregularidades.</p></div>`
    },
    {
      id: "controles-internos", num: "02", title: "Política de Controles Internos", ref: "Arts. 9º a 15",
      law: lawArt("Res. 4.515, Art. 9º", '<span class="caput">A administradora de consórcios deve implementar e manter política de controles internos efetiva e consistente com a natureza, o porte, a complexidade e o perfil de risco, contemplando:</span><span class="paragrafo">I — a definição de processos, procedimentos e responsabilidades;</span><span class="paragrafo">II — meios para assegurar a integridade e a confiabilidade das informações geradas;</span><span class="paragrafo">III — a avaliação periódica da efetividade dos controles implementados.</span>'),
      art: `<div class="art-title">Art. 9º</div><div class="art-text"><span class="par">A administradora deve implementar e manter política de controles internos efetiva e consistente com a natureza e o risco de suas operações.</span></div><div class="art-title">Art. 10</div><div class="art-text"><span class="par">A política deve contemplar: I — procedimentos aplicáveis aos processos operacionais; II — canais de comunicação que assegurem acesso a informações relevantes; III — acompanhamento sistemático das atividades; IV — verificação da aderência às normas vigentes.</span></div>`,
      body: `<p>A administradora deve implementar <span class="highlight">política de controles internos</span> que garanta: integridade e confiabilidade das informações, conformidade com leis e regulamentos, eficácia e eficiência das operações, e salvaguarda dos ativos dos grupos.</p>
<p>Isso inclui: manuais de procedimentos, trilhas de auditoria, controles de acesso a sistemas, reconciliações periódicas, e plano de continuidade de negócios.</p>
<div class="example-box"><div class="example-label">💡 Exemplo Prático</div><p>Na prática, a KonQ precisa ter: manual de operações documentado (como se processa uma contemplação, passo a passo), alçadas de aprovação (liberação de crédito acima de R$ 100.000 precisa de dois diretores), reconciliação diária entre sistema e banco (os valores no software batem com os extratos bancários?), e backup de dados com plano de recuperação em caso de desastre.</p></div>`
    },
    {
      id: "gestao-riscos", num: "03", title: "Gestão de Riscos", ref: "Arts. 16 a 22",
      law: lawArt("Res. 4.515, Art. 16", '<span class="caput">A administradora de consórcios deve implementar estrutura de gerenciamento de riscos compatível com a natureza, o porte, a complexidade e o perfil de risco, que permita a identificação, a mensuração, o controle e a mitigação dos riscos.</span>') +
           lawArt("Res. 4.515, Art. 18", '<span class="caput">O gerenciamento de riscos deve contemplar, no mínimo:</span><span class="paragrafo">I — risco operacional;</span><span class="paragrafo">II — risco de crédito;</span><span class="paragrafo">III — risco de liquidez;</span><span class="paragrafo">IV — risco legal.</span>'),
      art: `<div class="art-title">Art. 16</div><div class="art-text"><span class="par">A administradora deve implementar estrutura de gerenciamento de riscos compatível com suas operações.</span></div><div class="art-title">Art. 17</div><div class="art-text"><span class="par">A estrutura deve prever: I — identificação dos riscos; II — mensuração; III — controle; IV — mitigação; V — monitoramento.</span></div><div class="art-title">Art. 18</div><div class="art-text"><span class="par">Os riscos incluem, no mínimo: I — risco operacional; II — risco de crédito; III — risco de liquidez; IV — risco legal.</span></div>`,
      body: `<p>A administradora deve identificar, medir, controlar e mitigar os riscos de sua operação. Os principais: <span class="highlight">risco operacional</span> (falhas de processo, fraude, TI), <span class="highlight">risco de crédito</span> (inadimplência dos consorciados), <span class="highlight">risco de liquidez</span> (capacidade de honrar as contemplações), e <span class="highlight">risco legal</span> (processos judiciais, sanções regulatórias).</p>
<div class="example-box"><div class="example-label">💡 Exemplo Prático</div><p>A KonQ cria uma matriz de riscos: (1) Risco de crédito — 20% de inadimplência no Grupo 003 comprometeria as contemplações → mitigação: análise de crédito pré-adesão + fundo de reserva robusto. (2) Risco operacional — falha no sistema no dia da assembleia → mitigação: servidor redundante + procedimento manual de contingência. (3) Risco de liquidez — muitos lances baixos, sobra de caixa insuficiente → mitigação: modelagem financeira prévia e monitoramento mensal.</p></div>`
    },
    {
      id: "ouvidoria", num: "04", title: "Ouvidoria", ref: "Arts. 23 a 26",
      law: lawArt("Res. 4.515, Art. 23", '<span class="caput">A administradora de consórcios deve instituir componente organizacional de ouvidoria, com a atribuição de atuar como canal de comunicação entre a instituição e os consorciados e demais usuários de seus serviços, inclusive na mediação de conflitos.</span>') +
           lawArt("Res. 4.515, Art. 25", '<span class="caput">A ouvidoria deve ter acesso às informações necessárias para a elaboração de resposta adequada às reclamações recebidas, bem como prestar atendimento de última instância às demandas dos clientes que não tiverem sido solucionadas nos canais de atendimento primário.</span>'),
      art: `<div class="art-title">Art. 23</div><div class="art-text"><span class="par">A administradora deve manter ouvidoria como canal de comunicação entre a administradora e os consorciados.</span></div><div class="art-title">Art. 24</div><div class="art-text"><span class="par">A ouvidoria tem por finalidade assegurar a observância dos direitos do consumidor e atuar como instância recursal para demandas não solucionadas nos canais primários.</span></div><div class="art-title">Art. 25</div><div class="art-text"><span class="par">A ouvidoria deve ter acesso direto ao conselho de administração ou à diretoria da administradora.</span></div>`,
      body: `<p>A administradora deve ter <span class="highlight">ouvidoria</span> como canal de última instância para reclamações dos consorciados. A ouvidoria atua quando o SAC não resolveu o problema. Deve ser independente e ter acesso direto à diretoria.</p>
<div class="example-box"><div class="example-label">💡 Exemplo Prático</div><p>Roberto reclama ao SAC da KonQ que sua contemplação está atrasada há 30 dias. O SAC não resolve. Roberto então aciona a Ouvidoria, que tem 10 dias úteis para responder. O ouvidor investiga internamente, descobre que houve falha no processo de análise de garantias, e determina correção imediata com pedido de desculpas formal. A Ouvidoria reporta o caso à diretoria para evitar recorrência.</p></div>`
    }
  ]
},

// ========== LEI 9.613 ==========
lei9613: {
  badge: "LEI FEDERAL", title: "Lei nº 9.613/1998",
  subtitle: "Prevenção à Lavagem de Dinheiro e Financiamento do Terrorismo (PLD/FT) — aplicável às administradoras de consórcios.",
  link: "https://www.planalto.gov.br/ccivil_03/leis/l9613.htm",
  linkLabel: "Texto integral no Planalto",
  topics: [
    {
      id: "kyc", num: "01", title: "Identificação de Clientes (KYC)", ref: "Art. 10",
      law: lawArt("Art. 10", '<span class="caput">As pessoas referidas no art. 9º:</span><span class="paragrafo">I — identificarão seus clientes e manterão cadastro atualizado, nos termos de instruções emanadas das autoridades competentes;</span><span class="paragrafo">II — manterão registro de toda transação em moeda nacional ou estrangeira, títulos e valores mobiliários, títulos de crédito, metais, ou qualquer ativo passível de ser convertido em dinheiro, que ultrapassar limite fixado pela autoridade competente e nos termos de instruções por esta expedidas;</span><span class="paragrafo">III — deverão adotar políticas, procedimentos e controles internos, compatíveis com seu porte e volume de operações.</span>'),
      art: `<div class="art-title">Art. 10</div><div class="art-text"><span class="par">As pessoas referidas no art. 9º: I — identificarão seus clientes e manterão cadastro atualizado; II — manterão registro de toda transação que ultrapassar limite fixado pela autoridade competente; III — deverão adotar políticas, procedimentos e controles internos compatíveis com seu porte e volume de operações.</span></div>`,
      body: `<p>A administradora deve <span class="highlight">identificar e qualificar seus clientes</span> antes da adesão: nome completo, CPF/CNPJ, endereço, profissão, renda, origem dos recursos. Deve manter cadastro atualizado e verificar a veracidade das informações.</p>
<p>"Conheça seu cliente" (KYC — Know Your Customer) é a base de toda a política de PLD. Não é opcional — é obrigação legal.</p>
<div class="example-box"><div class="example-label">💡 Exemplo Prático</div><p>Carlos quer aderir a 5 cotas de um grupo de imóveis (R$ 300.000 cada = R$ 1,5 milhão em crédito). A KonQ deve: verificar a identidade de Carlos, confirmar endereço e profissão, entender a origem da renda dele (como ele vai pagar R$ 12.500/mês em parcelas?), e avaliar se esse perfil é compatível com o volume financeiro. Se Carlos declarar ser autônomo com renda de R$ 5.000/mês, há uma incompatibilidade que precisa ser investigada.</p></div>`
    },
    {
      id: "operacoes-suspeitas", num: "02", title: "Comunicação de Operações Suspeitas", ref: "Art. 11",
      law: lawArt("Art. 11", '<span class="caput">As pessoas referidas no art. 9º:</span><span class="paragrafo">I — dispensarão especial atenção às operações que, nos termos de instruções emanadas das autoridades competentes, possam constituir-se em sérios indícios dos crimes previstos nesta Lei, ou com eles relacionar-se;</span><span class="paragrafo">II — deverão comunicar ao Coaf, abstendo-se de dar ciência de tal ato a qualquer pessoa, inclusive àquela à qual se refira a informação, no prazo de 24 (vinte e quatro) horas, a proposta ou realização:</span><span class="paragrafo">a) de todas as transações referidas no inciso II do art. 10 que ultrapassarem limite fixado, para esse fim, pela mesma autoridade e na forma e condições por ela estabelecidas;</span><span class="paragrafo">b) das operações referidas no inciso I deste artigo.</span>'),
      art: `<div class="art-title">Art. 11</div><div class="art-text"><span class="par">As pessoas referidas no art. 9º: I — dispensarão especial atenção às operações que possam constituir-se em sérios indícios dos crimes previstos nesta Lei; II — deverão comunicar ao COAF, abstendo-se de dar ciência de tal ato a qualquer pessoa, inclusive àquela à qual se refira a informação, no prazo de 24 horas.</span><span class="par"><span class="par-label">§ 3º</span> As comunicações de boa-fé não acarretarão responsabilidade civil ou administrativa.</span></div>`,
      body: `<p>A administradora deve comunicar ao <span class="highlight">COAF (Conselho de Controle de Atividades Financeiras)</span> operações que apresentem indícios de lavagem de dinheiro: transações incompatíveis com a renda do cliente, pagamentos em espécie de valores elevados, movimentações atípicas, ou qualquer situação suspeita.</p>
<p>A comunicação deve ser feita em até 24 horas após a identificação e é sigilosa — a administradora NÃO pode informar ao cliente que fez a comunicação.</p>
<div class="example-box"><div class="example-label">💡 Exemplo Prático</div><p>Um consorciado da KonQ tenta pagar 12 parcelas antecipadas em dinheiro vivo, totalizando R$ 150.000. Isso acende um alerta: pagamento em espécie de alto valor, sem origem justificada. A KonQ deve: 1) registrar a operação, 2) comunicar ao COAF em 24h, 3) NÃO alertar o cliente, 4) continuar monitorando a conta dele. O COAF investigará por conta própria.</p></div>`
    },
    {
      id: "pep", num: "03", title: "Pessoas Expostas Politicamente (PEP)", ref: "Art. 12",
      law: lawArt("Art. 11, § 3º (incluído pela Lei 12.683/2012)", '<span class="caput">As pessoas de que trata o art. 9º devem adotar procedimentos reforçados de identificação e monitoramento de operações envolvendo pessoas politicamente expostas, seus familiares, estreitos colaboradores, bem como empresas e pessoas jurídicas de que participem.</span>'),
      art: `<div class="art-title">Art. 12 (regulamentação)</div><div class="art-text"><span class="par">As pessoas mencionadas no art. 9º devem dispensar especial atenção às operações envolvendo pessoa exposta politicamente. Consideram-se PEP: os detentores de mandatos eletivos dos Poderes Executivo e Legislativo da União; os ministros de Estado ou equivalentes; os membros dos tribunais superiores e do TCU; bem como seus familiares e estreitos colaboradores.</span></div>`,
      body: `<p>Pessoas Expostas Politicamente — políticos, servidores de alto escalão, seus familiares e associados — requerem <span class="highlight">diligência reforçada (Enhanced Due Diligence)</span>. A administradora deve identificar se o cliente é PEP, monitorar suas transações com atenção especial, e documentar toda a relação comercial.</p>
<div class="example-box"><div class="example-label">💡 Exemplo Prático</div><p>Um vereador de uma cidade do interior quer aderir a um grupo de imóveis da KonQ. O sistema de cadastro identifica que ele é PEP. A KonQ deve: classificar como cliente de risco elevado, exigir documentação adicional sobre patrimônio e renda, monitorar todas as movimentações com frequência maior, e manter o registro por pelo menos 5 anos após o fim da relação.</p></div>`
    },
    {
      id: "penalidades-pld", num: "04", title: "Penalidades por Descumprimento", ref: "Arts. 12 a 14",
      law: lawArt("Art. 12", '<span class="caput">Às pessoas referidas no art. 9º, bem como aos administradores das pessoas jurídicas, que deixem de cumprir as obrigações previstas nos arts. 10 e 11 serão aplicadas, cumulativamente ou não, pelas autoridades competentes, as seguintes sanções:</span><span class="paragrafo">I — advertência;</span><span class="paragrafo">II — multa pecuniária variável não superior:</span><span class="paragrafo">a) ao dobro do valor da operação;</span><span class="paragrafo">b) ao valor de R$ 20.000.000,00 (vinte milhões de reais);</span><span class="paragrafo">III — inabilitação temporária, pelo prazo de até dez anos, para o exercício do cargo de administrador.</span>'),
      art: `<div class="art-title">Art. 12</div><div class="art-text"><span class="par">Às pessoas que deixem de cumprir as obrigações previstas nos arts. 10 e 11 serão aplicadas: I — advertência; II — multa pecuniária não superior a: a) ao dobro do valor da operação; b) ao dobro do lucro obtido; ou c) R$ 20.000.000,00; III — inabilitação temporária, pelo prazo de até dez anos; IV — cassação ou suspensão da autorização para funcionamento.</span></div>`,
      body: `<p>O descumprimento das obrigações de PLD pode resultar em: <span class="highlight">multa de até R$ 20 milhões (ou o dobro do valor da operação)</span>, inabilitação temporária para exercer cargo de administração, cassação da autorização de funcionamento, e até responsabilização criminal dos diretores.</p>

cdc: {

      law: lawArt("Art. 6º, III", '<span class="caput">São direitos básicos do consumidor: a informação adequada e clara sobre os diferentes produtos e serviços, com especificação correta de quantidade, características, composição, qualidade, tributos incidentes e preço, bem como sobre os riscos que apresentem.</span>') +
           lawArt("Art. 31", '<span class="caput">A oferta e apresentação de produtos ou serviços devem assegurar informações corretas, claras, precisas, ostensivas e em língua portuguesa sobre suas características, qualidades, quantidade, composição, preço, garantia, prazos de validade e origem, entre outros dados.</span>') +
           lawArt("Art. 46", '<span class="caput">Os contratos que regulam as relações de consumo não obrigarão os consumidores, se não lhes for dada a oportunidade de tomar conhecimento prévio de seu conteúdo, ou se os respectivos instrumentos forem redigidos de modo a dificultar a compreensão de seu sentido e alcance.</span>'),
      art: `<div class="art-title">Art. 6º, III</div><div class="art-text"><span class="par">São direitos básicos do consumidor: a informação adequada e clara sobre os diferentes produtos e serviços, com especificação correta de quantidade, características, composição, qualidade, tributos incidentes e preço, bem como sobre os riscos que apresentem.</span></div><div class="art-title">Art. 31</div><div class="art-text"><span class="par">A oferta e apresentação de produtos ou serviços devem assegurar informações corretas, claras, precisas, ostensivas e em língua portuguesa.</span></div><div class="art-title">Art. 46</div><div class="art-text"><span class="par">Os contratos não obrigarão os consumidores, se não lhes for dada a oportunidade de tomar conhecimento prévio de seu conteúdo, ou se os instrumentos forem redigidos de modo a dificultar a compreensão.</span></div>`,
      body: `<p>O consumidor (consorciado) tem direito à <span class="highlight">informação clara, precisa e ostensiva</span> sobre o produto/serviço. No consórcio, isso significa: o contrato deve ser compreensível, todos os custos devem ser explicitados (taxa de administração, seguro, fundo de reserva), e nenhuma cláusula pode estar "escondida" em letras miúdas.</p>
<div class="example-box"><div class="example-label">💡 Exemplo Prático</div><p>O vendedor da KonQ apresenta o consórcio para Juliana. Ele deve informar claramente: "Sua parcela será R$ 1.200/mês, sendo R$ 800 de fundo comum, R$ 200 de taxa de administração, R$ 100 de fundo de reserva e R$ 100 de seguro. Você pode ser contemplada por sorteio ou lance. NÃO há garantia de quando será contemplada. O prazo do grupo é 72 meses." Se o vendedor disser "você vai ser contemplada em 3 meses", isso é informação enganosa.</p></div>`
    },
    {
      id: "arrependimento", num: "02", title: "Direito de Arrependimento", ref: "Art. 49",
      law: lawArt("Art. 49", '<span class="caput">O consumidor pode desistir do contrato, no prazo de 7 dias a contar de sua assinatura ou do ato de recebimento do produto ou serviço, sempre que a contratação de fornecimento de produtos e serviços ocorrer fora do estabelecimento comercial, especialmente por telefone ou a domicílio.</span><span class="paragrafo">Parágrafo único. Se o consumidor exercitar o direito de arrependimento previsto neste artigo, os valores eventualmente pagos, a qualquer título, durante o prazo de reflexão, serão devolvidos, de imediato, monetariamente atualizados.</span>'),
      art: `<div class="art-title">Art. 49</div><div class="art-text"><span class="par">O consumidor pode desistir do contrato, no prazo de 7 dias a contar de sua assinatura ou do ato de recebimento do produto ou serviço, sempre que a contratação ocorrer fora do estabelecimento comercial, especialmente por telefone ou a domicílio.</span><span class="par"><span class="par-label">Parágrafo único.</span> Se o consumidor exercitar o direito de arrependimento, os valores eventualmente pagos, a qualquer título, durante o prazo de reflexão, serão devolvidos, de imediato, monetariamente atualizados.</span></div>`,
      body: `<p>Em vendas realizadas <span class="highlight">fora do estabelecimento comercial</span> (internet, telefone, porta a porta), o consumidor tem <span class="highlight">7 dias</span> para desistir do contrato sem qualquer ônus, contados da assinatura ou do recebimento do produto/serviço.</p>
<p>Isso é crucial para consórcios vendidos digitalmente — que é exatamente o modelo da KonQ.</p>
<div class="example-box"><div class="example-label">💡 Exemplo Prático</div><p>Roberto compra uma cota de consórcio pelo app da KonQ numa sexta-feira à noite. Na segunda-feira, muda de ideia. Ele tem até a sexta-feira seguinte (7 dias corridos) para exercer o direito de arrependimento. A KonQ deve devolver 100% dos valores pagos, inclusive a taxa de adesão, sem nenhuma cobrança. Esse é um direito absoluto do consumidor para vendas não presenciais.</p></div>
<div class="warn-box"><div class="warn-label">⚠️ Ponto de atenção</div><p>O direito de arrependimento de 7 dias se aplica a vendas fora do estabelecimento. Para vendas realizadas presencialmente no escritório da administradora, esse prazo NÃO se aplica automaticamente — a desistência segue as regras da Lei 11.795.</p></div>`
    },
    {

      law: lawArt("Art. 37", '<span class="caput">É proibida toda publicidade enganosa ou abusiva.</span><span class="paragrafo">§ 1º É enganosa qualquer modalidade de informação ou comunicação de caráter publicitário, inteira ou parcialmente falsa, ou, por qualquer outro modo, mesmo por omissão, capaz de induzir em erro o consumidor a respeito da natureza, características, qualidade, quantidade, propriedades, origem, preço e quaisquer outros dados sobre produtos e serviços.</span><span class="paragrafo">§ 3º Para os efeitos deste código, a publicidade é enganosa por omissão quando deixar de informar sobre dado essencial do produto ou serviço.</span>'),
      art: `<div class="art-title">Art. 36</div><div class="art-text"><span class="par">A publicidade deve ser veiculada de tal forma que o consumidor, fácil e imediatamente, a identifique como tal.</span></div><div class="art-title">Art. 37, § 1º</div><div class="art-text"><span class="par">É enganosa qualquer modalidade de informação ou comunicação de caráter publicitário, inteira ou parcialmente falsa, ou, por qualquer outro modo, mesmo por omissão, capaz de induzir em erro o consumidor a respeito da natureza, características, qualidade, quantidade, propriedades, origem, preço e quaisquer outros dados sobre produtos e serviços.</span></div>`,
      body: `<p>É proibida toda <span class="highlight">publicidade enganosa ou abusiva</span>. No consórcio, os maiores riscos são: prometer contemplação rápida ou garantida, comparar incorretamente com financiamento, omitir custos totais, ou usar linguagem que induza o consumidor a erro.</p>
<div class="example-box"><div class="example-label">💡 Exemplo Prático</div><p>O que a KonQ NÃO pode fazer na publicidade: "Consórcio com contemplação garantida nos primeiros meses!" (falso — contemplação depende de sorteio ou lance). "Sem juros!" (tecnicamente correto que não há juros, mas omitir a taxa de administração é enganoso). "Melhor que poupança!" (consórcio não é investimento, comparação indevida). O que pode: "Parcelas a partir de R$ 500/mês, sem juros bancários, com possibilidade de contemplação por sorteio ou lance."</p></div>`

  ]

  {q:"A carta de crédito do consórcio pode ser utilizada para qualquer finalidade?",o:["Sim, é dinheiro livre do consorciado","Não — o crédito é vinculado à finalidade do grupo","Sim, se o consorciado pagar taxa extra","Depende da assembleia do grupo"],c:1,e:"A carta de crédito é vinculada à finalidade do grupo. Se o grupo é de imóveis, o crédito só pode ser usado para adquirir imóvel."},
  {q:"Quais são as duas formas de contemplação previstas na lei?",o:["Sorteio e lance","Sorteio e antiguidade","Lance e mérito financeiro","Sorteio e indicação"],c:0,e:"A Lei 11.795 prevê contemplação por sorteio (aleatório) e por lance (competitivo, baseado na antecipação de parcelas)."},
  {q:"O que acontece com o consorciado contemplado que não apresenta garantias?",o:["Recebe o crédito normalmente, sem garantias","Perde a contemplação e volta para o sorteio do mês seguinte","É excluído do grupo automaticamente","O crédito é liberado com desconto de 30%"],c:1,e:"A contemplação não garante a entrega imediata do crédito. O contemplado precisa apresentar garantias, estar adimplente e passar por análise para receber o recurso."},

  {q:"O consorciado excluído por inadimplência recebe devolução dos valores pagos imediatamente?",o:["Sim, em até 30 dias","Sim, se pagar multa de 10%","Não — recebe por sorteio ou no encerramento do grupo","Não — perde tudo que pagou"],c:2,e:"Após a Lei 11.795, o excluído NÃO recebe devolução imediata. Recebe por sorteio nas assembleias ou no encerramento do grupo, com deduções contratuais."},
  {q:"Qual é a finalidade do fundo de reserva?",o:["Remunerar a administradora","Cobrir inadimplência e insuficiências do grupo","Investir em marketing do grupo","Pagar impostos do grupo"],c:1,e:"O fundo de reserva é destinado a cobrir inadimplência, despesas extraordinárias e insuficiências financeiras do grupo."},
  {q:"A assembleia do grupo de consórcio pode ser realizada de forma digital?",o:["Não — deve ser sempre presencial","Sim, se previsto em contrato","Sim, mas apenas em casos excepcionais","Não — a Circular 3.432 proíbe"],c:1,e:"A assembleia pode ser digital se previsto no contrato de adesão. Essa possibilidade é fundamental para administradoras digitais como a KonQ."},
  {q:"Qual forma societária é aceita pelo BACEN para administradoras de consórcios?",o:["Apenas S.A.","Apenas LTDA","MEI ou EIRELI","S.A. ou LTDA"],c:3,e:"O BACEN aceita Sociedade Anônima ou Sociedade Limitada, desde que cumpridos os demais requisitos de capital, idoneidade e capacidade técnica."},
  {q:"O que acontece se um sócio da administradora tiver restrições financeiras graves?",o:["Nada — isso é irrelevante","A autorização pode ser negada ou revogada","O sócio paga multa e continua","O BACEN exige apenas uma carta de explicação"],c:1,e:"O BACEN avalia a idoneidade moral e financeira dos sócios. Restrições graves (protestos, insolvência, condenações) podem inviabilizar a autorização."},
  {q:"A entrada de um novo sócio relevante na administradora precisa ser comunicada ao BACEN?",o:["Não — é decisão interna da empresa","Sim — e o novo sócio passa pela mesma análise de idoneidade","Apenas se o novo sócio tiver mais de 50%","Só depois que a operação for concluída"],c:1,e:"Qualquer alteração societária relevante deve ser previamente comunicada e, em muitos casos, aprovada pelo BACEN."},
  {q:"A administradora é obrigada a ter auditoria externa?",o:["Não — é opcional","Sim — auditor independente registrado na CVM e CRC","Apenas se tiver mais de 10 grupos ativos","Apenas se faturar acima de R$ 10 milhões"],c:1,e:"A Circular 3.433 exige contratação de auditoria externa independente para examinar as demonstrações financeiras da administradora e dos grupos."},
  {q:"O que é KYC no contexto de administradoras de consórcios?",o:["Know Your Company — conhecer sua empresa","Know Your Credit — conhecer seu crédito","Know Your Customer — conhecer seu cliente","Know Your Consortium — conhecer seu consórcio"],c:2,e:"KYC (Know Your Customer) é a obrigação de identificar e qualificar os clientes: nome, CPF, endereço, profissão, renda, origem dos recursos."},
  {q:"Em quanto tempo a administradora deve comunicar operações suspeitas ao COAF?",o:["7 dias úteis","30 dias","24 horas","48 horas"],c:2,e:"A comunicação de operações suspeitas ao COAF deve ser feita em até 24 horas após a identificação, e é sigilosa."},
  {q:"A administradora pode informar ao cliente que fez uma comunicação ao COAF?",o:["Sim — é direito do cliente saber","Sim, mas apenas por escrito","Não — a comunicação é sigilosa","Sim, se o cliente solicitar formalmente"],c:2,e:"A comunicação ao COAF é sigilosa. A administradora NÃO pode alertar o cliente de que fez a comunicação — isso comprometeria a investigação."},
  {q:"O que é PEP no contexto de PLD?",o:["Pessoa com Empréstimo Pendente","Pessoa Exposta Politicamente","Programa de Ensino Profissional","Perfil Especial de Pagamento"],c:1,e:"PEP = Pessoa Exposta Politicamente: políticos, servidores de alto escalão, seus familiares e associados, que requerem diligência reforçada."},
  {q:"Qual é a multa máxima por descumprimento das obrigações de PLD?",o:["R$ 1 milhão","R$ 5 milhões","R$ 20 milhões ou o dobro do valor da operação","R$ 50 milhões"],c:2,e:"O art. 12 da Lei 9.613 prevê multa de até R$ 20 milhões ou o dobro do valor da operação, além de inabilitação e possível responsabilização criminal."},
  {q:"Por quanto tempo a administradora deve manter os registros de operações para fins de PLD?",o:["1 ano","3 anos","5 anos","10 anos"],c:2,e:"Os registros devem ser mantidos por no mínimo 5 anos após o término da operação ou da relação comercial."},
  {q:"Qual é o prazo de arrependimento do consumidor para vendas fora do estabelecimento (CDC)?",o:["3 dias","5 dias úteis","7 dias corridos","15 dias"],c:2,e:"O art. 49 do CDC garante 7 dias corridos para o consumidor desistir de contratos firmados fora do estabelecimento comercial."},
  {q:"O direito de arrependimento de 7 dias se aplica a consórcios vendidos presencialmente no escritório da administradora?",o:["Sim — sempre se aplica","Não — aplica-se apenas a vendas fora do estabelecimento","Sim, mas com multa de 5%","Depende do valor da cota"],c:1,e:"O direito de arrependimento do art. 49 aplica-se apenas a vendas realizadas fora do estabelecimento (internet, telefone, porta a porta). Vendas presenciais seguem as regras da Lei 11.795."},
  {q:"A administradora pode afirmar em publicidade que o consórcio é um 'investimento sem risco'?",o:["Sim — é informação verdadeira","Sim, se comparar com a poupança","Não — consórcio não é investimento e isso é publicidade enganosa","Não, mas pode dizer que é 'investimento de baixo risco'"],c:2,e:"Consórcio NÃO é investimento. Afirmar isso constitui publicidade enganosa, vedada pelo CDC e passível de sanções pelo BACEN."},
  {q:"A administradora pode prometer 'contemplação nos primeiros 3 meses' em anúncios?",o:["Sim, se tiver histórico estatístico","Não — contemplação depende de sorteio ou lance, não pode ser prometida","Sim, se colocar um asterisco com nota de rodapé","Sim, para lances de até 50%"],c:1,e:"Prometer contemplação é publicidade enganosa. A contemplação depende de sorteio (aleatório) ou lance (competitivo), não podendo ser garantida."},
  {q:"Segundo a Circular 3.432, quando o grupo inicia suas atividades?",o:["Quando a primeira cota é vendida","Quando atinge o número mínimo de adesões que garanta viabilidade","Quando o BACEN autoriza o grupo especificamente","No primeiro dia do mês seguinte ao lançamento"],c:1,e:"O grupo inicia (primeira assembleia) quando atinge o número mínimo de adesões que garanta sua viabilidade econômico-financeira."},
  {q:"O contrato de adesão é personalizado para cada consorciado?",o:["Sim — cada um tem cláusulas diferentes","Não — é padronizado para todos do mesmo grupo","Sim, dependendo da análise de crédito","Depende da política da administradora"],c:1,e:"O contrato de adesão é padronizado — todos os consorciados de um mesmo grupo assinam o mesmo contrato, garantindo isonomia."},
  {q:"Qual critério é usado para desempate no lance fixo?",o:["Quem ofereceu primeiro","Sorteio entre os empatados","Quem tem mais parcelas pagas","Antiguidade no grupo"],c:1,e:"No lance fixo, quando mais de um consorciado oferece o mesmo valor, o desempate é feito por sorteio."},
  {q:"O contemplado precisa comprovar capacidade de pagamento das parcelas restantes?",o:["Não — já é membro do grupo","Sim — passa por análise de crédito","Apenas se o crédito for acima de R$ 500.000","Apenas para grupos de imóveis"],c:1,e:"O contemplado deve comprovar capacidade de pagamento das parcelas restantes, apresentar garantias e estar adimplente para receber o crédito."},
  {q:"O que acontece com o veículo de um contemplado que fica inadimplente?",o:["Nada — o veículo é dele","A administradora pode executar a alienação fiduciária (busca e apreensão)","O veículo é transferido para outro consorciado","A administradora negocia diretamente com o consorciado sem medida judicial"],c:1,e:"O veículo (ou imóvel) fica alienado fiduciariamente ao grupo. Em caso de inadimplência, a administradora pode acionar busca e apreensão para recuperar o bem."},
  {q:"Qual é a finalidade do seguro prestamista no consórcio?",o:["Proteger a administradora contra fraudes","Quitar as parcelas em caso de morte ou invalidez do consorciado","Garantir a valorização do bem","Cobrir danos ao bem adquirido"],c:1,e:"O seguro prestamista quita as parcelas restantes em caso de morte ou invalidez permanente do consorciado, protegendo tanto o grupo quanto os herdeiros."},
  {q:"Se o consorciado falece antes de ser contemplado, o que acontece com o seguro prestamista?",o:["O seguro é cancelado e os herdeiros perdem tudo","O crédito é liberado aos herdeiros conforme as regras do contrato","Os valores são devolvidos com desconto","O seguro só cobre quem já foi contemplado"],c:1,e:"Se o consorciado falece antes da contemplação, o seguro quita as parcelas e o crédito pode ser liberado aos herdeiros, conforme as regras do contrato e da apólice."},
  {q:"A governança da administradora exige segregação de funções. O que isso significa?",o:["Todos os diretores devem trabalhar em escritórios separados","Uma mesma pessoa não pode concentrar funções conflitantes","A administradora deve ter pelo menos 10 funcionários","Cada grupo deve ter um gerente exclusivo"],c:1,e:"Segregação de funções significa que, por exemplo, quem opera os grupos não pode ser quem faz a auditoria interna, evitando conflitos de interesse."},
  {q:"A ouvidoria da administradora é canal de primeira instância para reclamações?",o:["Sim — toda reclamação vai para a ouvidoria","Não — é canal de última instância, depois que o SAC não resolveu","Sim — e é o único canal obrigatório","Depende do porte da administradora"],c:1,e:"A ouvidoria é canal de última instância. O consorciado deve primeiro tentar resolver pelo SAC. Só quando o SAC não resolver, aciona a ouvidoria."},
  {q:"A administradora precisa ter plano de continuidade de negócios?",o:["Não — é opcional","Sim — faz parte da política de controles internos","Apenas se operar digitalmente","Apenas se tiver mais de 1.000 consorciados"],c:1,e:"O plano de continuidade de negócios é parte da política de controles internos exigida pela Resolução 4.515."},
  {q:"O que é risco de liquidez no contexto de uma administradora de consórcios?",o:["Risco de a administradora perder a autorização","Risco de não conseguir honrar as contemplações por falta de recursos no grupo","Risco de os consorciados processarem a administradora","Risco de perda dos investimentos em ações"],c:1,e:"Risco de liquidez é a possibilidade de o grupo não ter recursos suficientes para honrar as contemplações previstas, geralmente por inadimplência elevada."},
  {q:"A taxa de administração tem limite máximo definido em lei?",o:["Sim — 15% é o máximo legal","Sim — 20% é o máximo","Não — não há limite legal, mas o mercado regula","Sim — o BACEN define anualmente"],c:2,e:"Não existe limite legal máximo para a taxa de administração. Na prática, a concorrência de mercado e a transparência regulatória regulam os valores."},
  {q:"O que é o fundo comum do grupo de consórcio?",o:["Reserva para emergências","Contribuições dos consorciados destinadas à contemplação","Taxa da administradora","Fundo de investimento do grupo"],c:1,e:"O fundo comum é formado pelas contribuições mensais dos consorciados e é a fonte de onde saem os créditos para as contemplações."},
  {q:"O consorciado inadimplente pode participar do sorteio?",o:["Sim — inadimplência não afeta o sorteio","Não — apenas consorciados adimplentes concorrem","Sim, mas com 50% de chance","Depende do regulamento do grupo"],c:1,e:"O consorciado inadimplente NÃO concorre às contemplações enquanto estiver em atraso com suas obrigações."},
  {q:"Se a carta de crédito é de R$ 300.000 e o bem custa R$ 280.000, o que acontece com a diferença?",o:["O consorciado recebe os R$ 20.000 em dinheiro","A diferença abate parcelas restantes ou volta ao grupo","A administradora fica com a diferença","A diferença é perdida"],c:1,e:"Se o bem tem valor inferior à carta, a diferença pode ser usada para reduzir o saldo das parcelas restantes do consorciado."},
  {q:"A administradora pode usar recursos dos grupos para pagar suas próprias despesas operacionais?",o:["Sim, até 5% do fundo","Sim, em caso de emergência","Não — os recursos são segregados e pertencem ao grupo","Sim, se devolver com juros"],c:2,e:"Os recursos dos grupos são segregados. A administradora NÃO pode usá-los para cobrir despesas próprias — isso é infração grave passível de intervenção."},
  {q:"Qual normativo trata especificamente dos requisitos para obter autorização do BACEN para funcionar como administradora?",o:["Lei 11.795/2008","Circular 3.432/2009","Circular 3.433/2009","Resolução 4.515/2016"],c:2,e:"A Circular 3.433/2009 é a norma que trata especificamente da autorização para funcionar como administradora de consórcios."},
  {q:"O consorciado pode utilizar a carta de crédito para quitar um financiamento de bem da mesma natureza?",o:["Não — só pode comprar bem novo","Sim — é uma das utilizações previstas em lei","Apenas se o financiamento for do mesmo banco","Apenas com autorização especial do BACEN"],c:1,e:"A Lei 11.795 permite que a carta de crédito seja utilizada para quitação de financiamento de bem da mesma natureza do grupo."},
  {q:"As assembleias utilizam qual referência para o sorteio, garantindo transparência?",o:["Números gerados por sistema da administradora","Números da Loteria Federal","Dados do IBGE","Números escolhidos pelos consorciados"],c:1,e:"Geralmente, os grupos utilizam os números da Loteria Federal como referência para o sorteio, garantindo transparência e impossibilidade de manipulação."},
  {q:"O cancelamento da autorização da administradora pelo BACEN pode ser voluntário?",o:["Não — sempre é imposto pelo BACEN","Sim — pode ser solicitado pela administradora","Apenas se não houver grupos ativos","Apenas se aprovado pela CVM"],c:1,e:"O cancelamento pode ser voluntário (a administradora solicita) ou compulsório (imposto pelo BACEN). Em ambos os casos, os grupos devem ser regularizados."},
  {q:"Qual é a principal diferença entre consórcio e financiamento bancário?",o:["No consórcio não há taxa de administração","No financiamento não há contemplação","No consórcio há autofinanciamento coletivo sem juros bancários","No consórcio o bem é entregue imediatamente"],c:2,e:"A principal diferença é que no consórcio há autofinanciamento coletivo — os participantes financiam uns aos outros — sem juros bancários. No financiamento, o banco empresta e cobra juros."}
];

// ========== STATE ==========
let currentSection = 'home';
let checkedTopics = JSON.parse(localStorage.getItem('konq_checked') || '{}');
let quizAnswers = JSON.parse(localStorage.getItem('konq_quiz') || '{}');
let currentQuizPage = 0;
const QUIZ_PER_PAGE = 5;

// ========== RENDER ==========
function showSection(id) {
  currentSection = id;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => {
    if(n.getAttribute('onclick') && n.getAttribute('onclick').includes(id)) n.classList.add('active');
  });
  document.querySelector('.sidebar').classList.remove('open');
  if (id === 'quiz') { renderQuiz(); return; }
  const s = SECTIONS[id];
  if (!s) return;
  let html = '<div class="animate-in">';
  html += '<div class="section-badge">' + s.badge + '</div>';
  html += '<h1 class="section-title">' + s.title + '</h1>';
  html += '<p class="section-subtitle">' + s.subtitle + '</p>';
  if (s.link) html += '<a href="' + s.link + '" target="_blank" class="doc-link">📄 ' + s.linkLabel + ' ↗</a>';
  if (s.content) html += s.content;
  if (s.topics) {
    s.topics.forEach(function(t) {
      var isChecked = checkedTopics[t.id];
      html += '<div class="topic-card" id="card-' + t.id + '">';
      html += '<div class="topic-header" onclick="toggleTopic(\'' + t.id + '\')">';
      html += '<div class="topic-number">' + t.num + '</div>';
      html += '<div><div class="topic-title">' + t.title + '</div><div class="topic-ref">' + t.ref + '</div></div>';
      html += '<div class="topic-toggle" id="toggle-' + t.id + '">▼</div></div>';
      html += '<div class="topic-body" id="body-' + t.id + '">';
      // LAW TEXT BLOCK
      if (t.art) {
        html += '<button class="legal-toggle-btn" id="legbtn-' + t.id + '" onclick="event.stopPropagation(); toggleLegal(\'' + t.id + '\')">📖 Ver texto dos artigos</button>';
        html += '<div class="legal-text-box" id="legal-' + t.id + '"><div class="legal-header">Texto Legal — ' + t.ref + '</div>' + t.art + '</div>';
      }
      html += t.body;
      html += '<button class="check-btn ' + (isChecked ? 'checked' : '') + '" onclick="markStudied(\'' + t.id + '\', this)">';
      html += isChecked ? '✓ Estudado' : '☐ Marcar como estudado';
      html += '</button></div></div>';
    });
  }
  html += '</div>';
  document.getElementById('mainContent').innerHTML = html;
  window.scrollTo(0, 0);
  updateProgress();
}

function toggleTopic(id) {
  document.getElementById('body-' + id).classList.toggle('open');
  document.getElementById('toggle-' + id).classList.toggle('open');
}

function toggleLegal(id) {
  var box = document.getElementById('legal-' + id);
  var btn = document.getElementById('legbtn-' + id);
  box.classList.toggle('open');
  btn.classList.toggle('open');
  btn.innerHTML = box.classList.contains('open') ? '📖 Ocultar texto dos artigos' : '📖 Ver texto dos artigos';
}

function markStudied(id, btn) {
  checkedTopics[id] = !checkedTopics[id];
  localStorage.setItem('konq_checked', JSON.stringify(checkedTopics));
  btn.classList.toggle('checked');
  btn.innerHTML = checkedTopics[id] ? '✓ Estudado' : '☐ Marcar como estudado';
  updateProgress();
}

function updateProgress() {
  var total = 0, done = 0;
  Object.values(SECTIONS).forEach(function(s) {
    if (s.topics) s.topics.forEach(function(t) { total++; if (checkedTopics[t.id]) done++; });
  });
  var pct = total > 0 ? Math.round((done / total) * 100) : 0;
  var bar = document.getElementById('progressBar');
  var label = document.getElementById('progressLabel');
  if (bar) bar.style.width = pct + '%';
  if (label) label.textContent = done + ' de ' + total + ' tópicos estudados (' + pct + '%)';
}

// ========== QUIZ ==========
function renderQuiz() {
  var start = currentQuizPage * QUIZ_PER_PAGE;
  var end = Math.min(start + QUIZ_PER_PAGE, QUIZ.length);
  var totalPages = Math.ceil(QUIZ.length / QUIZ_PER_PAGE);
  var correct = 0, answered = 0;
  Object.entries(quizAnswers).forEach(function(e) { answered++; if (e[1].correct) correct++; });
  var html = '<div class="animate-in">';
  html += '<div class="section-badge">AVALIAÇÃO</div>';
  html += '<h1 class="section-title">Quiz — 50 Questões</h1>';
  html += '<div class="quiz-header"><p class="section-subtitle" style="margin-bottom:0">Teste seu conhecimento sobre a regulamentação de consórcios.</p>';
  html += '<div class="quiz-score">' + correct + '/' + answered + ' corretas ' + (answered > 0 ? '(' + Math.round(correct / answered * 100) + '%)' : '') + '</div></div>';
  if (answered === QUIZ.length) {
    var pct = Math.round(correct / QUIZ.length * 100);
    var msg = pct >= 80 ? '🎉 Excelente! Você domina o regulatório.' : pct >= 60 ? '👍 Bom resultado, mas revise os tópicos errados.' : '📚 Recomendo revisitar os conteúdos antes de prosseguir.';
    html += '<div style="background:var(--bg3);border-radius:12px;padding:20px;margin-bottom:24px;text-align:center;">';
    html += '<div style="font-size:48px;margin-bottom:8px;">' + (pct >= 80 ? '🏆' : pct >= 60 ? '📊' : '📖') + '</div>';
    html += '<div style="font-size:20px;font-weight:700;margin-bottom:8px;">' + correct + ' de ' + QUIZ.length + ' — ' + pct + '%</div>';
    html += '<div style="color:var(--text2);font-size:14px;">' + msg + '</div>';
    html += '<button class="btn-primary" style="margin-top:16px;" onclick="resetQuiz()">Refazer Quiz</button></div>';
  }
  for (var i = start; i < end; i++) {
    var q = QUIZ[i], a = quizAnswers[i];
    html += '<div class="quiz-card" id="qcard-' + i + '"><div class="q-number">QUESTÃO ' + (i + 1) + ' DE ' + QUIZ.length + '</div>';
    html += '<div class="q-text">' + q.q + '</div>';
    q.o.forEach(function(opt, oi) {
      var cls = '';
      if (a !== undefined) {
        cls = 'answered';
        if (oi === q.c) cls += ' correct show-correct';
        else if (oi === a.selected && !a.correct) cls += ' wrong';
      }
      html += '<button class="quiz-option ' + cls + '" ' + (a !== undefined ? 'disabled' : '') + ' onclick="answerQuiz(' + i + ',' + oi + ')">' + String.fromCharCode(65 + oi) + ') ' + opt + '</button>';
    });
    if (a !== undefined) html += '<div class="quiz-explanation"><strong>' + (a.correct ? '✓ Correto!' : '✗ Incorreto.') + '</strong> ' + q.e + '</div>';
    html += '</div>';
  }
  html += '<div class="quiz-nav">';
  for (var p = 0; p < totalPages; p++) {
    var pgClass = p === currentQuizPage ? 'current' : '';
    var allC = true, anyW = false, anyA = false;
    for (var j = p * QUIZ_PER_PAGE; j < Math.min((p + 1) * QUIZ_PER_PAGE, QUIZ.length); j++) {
      if (quizAnswers[j] !== undefined) { anyA = true; if (!quizAnswers[j].correct) { allC = false; anyW = true; } } else allC = false;
    }
    if (anyA && allC) pgClass += ' q-correct'; else if (anyW) pgClass += ' q-wrong';
    html += '<button class="' + pgClass + '" onclick="quizPage(' + p + ')">' + (p * QUIZ_PER_PAGE + 1) + '-' + Math.min((p + 1) * QUIZ_PER_PAGE, QUIZ.length) + '</button>';
  }
  html += '</div></div>';
  document.getElementById('mainContent').innerHTML = html;
  window.scrollTo(0, 0);
}

function answerQuiz(qi, oi) {
  quizAnswers[qi] = { selected: oi, correct: oi === QUIZ[qi].c };
  localStorage.setItem('konq_quiz', JSON.stringify(quizAnswers));
  renderQuiz();
  setTimeout(function() { var el = document.getElementById('qcard-' + qi); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 100);
}

function quizPage(p) { currentQuizPage = p; renderQuiz(); }

function resetQuiz() { quizAnswers = {}; localStorage.removeItem('konq_quiz'); currentQuizPage = 0; renderQuiz(); }

// ========== INIT ==========
showSection('home');
</script>
</body>
</html>
